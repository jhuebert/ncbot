services:
  ncbot:
    image: jhuebert/ncbot:latest
    container_name: ncbot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./application.yaml:/app/application.yaml:ro   # Config file (see application.example.yaml)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
