services:
  ncbot:
    image: jhuebert/ncbot:latest
    container_name: ncbot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data          # Persist SQLite database
    environment:
      # AI Model (OpenAI-compatible endpoint, e.g. llama.cpp)
      - NCBOT_API_KEY=your-api-key
      - NCBOT_OPENAI_BASE_URL=http://your-llama-cpp-host:8080
      - NCBOT_MODEL=llama3
      - NCBOT_TEMPERATURE=0.7
      # Bot behavior
      - NCBOT_RESPONSE_DELAY_SECONDS=1.5
      - NCBOT_MAX_REPLY_BYTES=128
      - NCBOT_HISTORY_LIMIT=20
      # Channel filtering
      - NCBOT_ALLOW_DMS=false                               # respond to DMs? (false = channel-only)
      # Optional: custom system prompt via file mount or override
      # - NCBOT_SYSTEM_PROMPT=...
