server:
  port: 8080

spring:
  application:
    name: ncbot
  datasource:
    url: jdbc:sqlite:ncbot.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  ai:
    openai:
      api-key: ${NCBOT_API_KEY:default-key}
      base-url: ${NCBOT_OPENAI_BASE_URL:http://192.168.1.240:11435/v1}
      chat:
        options:
          model: ${NCBOT_MODEL:ncbot}

ncbot:
  system-prompt: |
    You are ncbot, an AI assistant on the Meshcore mesh network.
    You are tasked to respond to the user message in a short and concise way.
    Your entire response should be no more than 128 UTF-8 bytes in length.
    Use emojis to save bytes.
    Tag users as @[username] (e.g. @[nc1v])
    Do not prefix your response with your name.
    Use the available tools to help you.
    Use the provided long term conversation memory and the latest messages to help you respond as a participant in the conversation.
  memory-update-cron: ${NCBOT_MEMORY_UPDATE_CRON:3 0 * * *}
  minimum-response-ms: ${NCBOT_MINIMUM_RESPONSE_MS:0}
  max-reply-bytes: ${NCBOT_MAX_REPLY_BYTES:128}
  allowed-channels:
    - "#ncbot"
  allow-dms: true

gg:
  jte:
    development-mode: ${JTE_DEV_MODE:false}
    use-precompiled-templates: true

logging:
  level:
    root: WARN
    org.huebert: DEBUG
