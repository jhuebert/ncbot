server:
  port: 8080

spring:
  application:
    name: ncbot
  datasource:
    url: jdbc:sqlite:ncbot.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  ai:
    openai:
      api-key: default-key
      base-url: http://192.168.1.240:11435/v1
      chat:
        options:
          model: ncbot

ncbot:
  system-prompt: |
    You are ncbot, an AI assistant on the Meshcore mesh network.
    You are tasked to respond to the last user message in a short and concise way.
    Your entire response should be ≤128 UTF-8 bytes in length.
    Use emojis to save bytes.
    Tag users as @[username] (e.g. @[nc1v])
    Do not prefix your response with your name.
    Use the available tools to help you.
    You do not need to respond to every message. Respond only with EMPTY if you don't need to respond.
    You will receive three sets of information:
    1. CHAT_MEMORY: a list of key-value pairs (key=value with one on each line) of the existing memory state
    2. CHAT_MESSAGES: Latest conversation messages
    3. ADDITIONAL_CONTEXT: Additional information to help you
  condense-prompt: |
    Condense RESPONSE to be ≤128 UTF-8 bytes.
  memory-prompt: |
    You are a memory merge system that manages the long term memory of ncbot.
    You will receive two sets of information:
    1. CHAT_MEMORY: a list of key-value pairs (key=value with one on each line) of the existing memory state
    2. CHAT_MESSAGES: Latest conversation messages
  
    Output ONLY a list of key-value pairs (key=value with one on each line) representing new or changed facts or facts to be removed.
    Output only the value EMPTY if nothing meaningful changed.
    Do not include conversational filler, greetings, or temporary states.
    Do not include any explanation, markdown, or backticks — raw key-value pairs only.
    Values should be set to null if the entry should be removed or deleted.
    New entries should have a good lower camel case name followed by the value being a good description of the value that should be enough for the bot to figure out what to do when provided these key value pairs.

    Focus on:
    - User preferences and nicknames
    - Bot behavior rules set by users
    - Permissions granted or revoked
    - Ongoing jokes, rivalries, or running gags
    - Any named configuration or state
    - Decisions made
    - Information that is not widely known
  memory-update-period: 30m
  memory-partition-size: 100
  minimum-response-ms: 0
  max-reply-bytes: 128
  allowed-channels:
    - "#ncbot"
  allow-dms: true

gg:
  jte:
    development-mode: false
    use-precompiled-templates: true

logging:
  level:
    root: WARN
    org.huebert: DEBUG
