<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ncbot admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/admin/admin.css" rel="stylesheet">
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-expand border-bottom">
    <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-robot"></i> ncbot
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar" aria-controls="sidebar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="#" id="nav-info" onclick="showInfo(); return false;">
                    <i class="bi bi-info-circle"></i> Info
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="app-body">
    <!-- Left Sidebar: Channels -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header px-3 py-2 d-flex align-items-center justify-content-between">
            <span class="small text-body-secondary text-uppercase fw-semibold" style="letter-spacing: 0.05em;">Channels</span>
            <button class="btn btn-sm btn-outline-secondary" onclick="refreshChannels()" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
        <div id="channels-public" class="sidebar-list"></div>
        <div class="sidebar-section-header px-3 py-2 d-flex align-items-center justify-content-between">
            <span class="small text-body-secondary text-uppercase fw-semibold" style="letter-spacing: 0.05em;">Direct Messages</span>
        </div>
        <div id="channels-dm" class="sidebar-list"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
    <!-- Tab bar -->
    <ul class="nav nav-tabs nav-underline" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="messages-tab" data-bs-toggle="tab" data-bs-target="#messages" type="button" role="tab" aria-controls="messages" aria-selected="true">
                <i class="bi bi-chat-dots"></i> Messages
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="memory-tab" data-bs-toggle="tab" data-bs-target="#memory" type="button" role="tab" aria-controls="memory" aria-selected="false">
                <i class="bi bi-brain"></i> Memory
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="participants-tab" data-bs-toggle="tab" data-bs-target="#participants" type="button" role="tab" aria-controls="participants" aria-selected="false">
                <i class="bi bi-people"></i> Participants
            </button>
        </li>
    </ul>

    <!-- Tab content -->
    <div class="tab-content" id="mainTabContent">
        <!-- Messages Tab -->
        <div class="tab-pane fade show active" id="messages" role="tabpanel" aria-labelledby="messages-tab">
            <div class="messages-header px-3 py-2 border-bottom d-flex align-items-center justify-content-between">
                <div>
                    <span class="channel-name fw-semibold" id="messages-channel-name">Select a channel</span>
                    <span class="small text-body-secondary ms-2" id="messages-channel-key"></span>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadMessages()" title="Refresh">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
            </div>
            <div class="messages-container" id="messages-list">
                <div class="empty-state">
                    <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                    <p class="mt-2">Select a channel from the sidebar to view messages.</p>
                </div>
            </div>
            <div class="text-center py-2 border-top" id="load-more-indicator">
                <span class="small text-body-secondary" id="load-more-text">Scroll up to load older messages</span>
                <div class="spinner-border spinner-border-sm text-body-secondary" id="load-more-spinner" style="display: none;"></div>
            </div>
        </div>

        <!-- Memory Tab -->
        <div class="tab-pane fade" id="memory" role="tabpanel" aria-labelledby="memory-tab">
            <div class="memory-view">
                <!-- Channel memory -->
                <div id="memory-channel-section">
                    <div class="section-header px-3 py-2 border-bottom d-flex align-items-center justify-content-between">
                        <span class="fw-semibold"><i class="bi bi-folder"></i> Channel Memory</span>
                        <button class="btn btn-sm btn-outline-primary" onclick="showAddMemoryForm(null)">
                            <i class="bi bi-plus"></i> Add
                        </button>
                    </div>
                    <div id="memory-channel-list" class="memory-list px-3 py-2"></div>
                </div>
                <!-- Global memory -->
                <div id="memory-global-section" class="mt-3">
                    <div class="section-header px-3 py-2 border-bottom d-flex align-items-center justify-content-between">
                        <span class="fw-semibold"><i class="bi bi-globe"></i> Global Memory</span>
                        <button class="btn btn-sm btn-outline-primary" onclick="showAddMemoryForm(null)">
                            <i class="bi bi-plus"></i> Add
                        </button>
                    </div>
                    <div id="memory-global-list" class="memory-list px-3 py-2"></div>
                </div>
            </div>
        </div>

        <!-- Participants Tab -->
        <div class="tab-pane fade" id="participants" role="tabpanel" aria-labelledby="participants-tab">
            <div class="participants-view">
                <!-- Channel participants -->
                <div id="participants-channel-section">
                    <div class="section-header px-3 py-2 border-bottom d-flex align-items-center justify-content-between">
                        <span class="fw-semibold"><i class="bi bi-people"></i> Channel Participants</span>
                    </div>
                    <div id="participants-channel-list" class="participant-list px-3 py-2"></div>
                </div>
                <!-- All participants -->
                <div id="participants-all-section" class="mt-3">
                    <div class="section-header px-3 py-2 border-bottom d-flex align-items-center justify-content-between">
                        <span class="fw-semibold"><i class="bi bi-people-fill"></i> All Participants</span>
                    </div>
                    <div id="participants-all-list" class="participant-list px-3 py-2"></div>
                </div>
            </div>
        </div>
    </div>
</main>

</div>

<!-- Add/Edit Memory Modal -->
<div class="modal fade" id="memoryModal" tabindex="-1" aria-labelledby="memoryModalLabel">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="memoryModalLabel">Add Memory</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="memoryForm">
                    <input type="hidden" id="memoryFormId">
                    <input type="hidden" id="memoryFormChannelId">
                    <div class="mb-3">
                        <label for="memoryFormKey" class="form-label">Key</label>
                        <input type="text" class="form-control form-control-sm key-input" id="memoryFormKey" required
                               placeholder="e.g. user.alice.location">
                    </div>
                    <div class="mb-3">
                        <label for="memoryFormValue" class="form-label">Value</label>
                        <textarea class="form-control form-control-sm value-input" id="memoryFormValue" rows="3" required
                                  placeholder="e.g. Portland, OR"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-sm btn-primary" onclick="saveMemoryFromModal()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Info Modal -->
<div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="infoModalLabel">Bot Info</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <dl class="row mb-0" id="infoDetails"></dl>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin/admin.js"></script>
</body>
</html>
