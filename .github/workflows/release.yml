name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: jhuebert/ncbot

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Read current version
        id: read_version
        run: |
          VERSION_FILE="VERSION"
          if [[ -f "$VERSION_FILE" ]]; then
            CURRENT_VERSION=$(head -n 1 "$VERSION_FILE" | tr -d '[:space:]')
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Increment patch version
        id: bump_version
        run: |
          VERSION="${{ steps.read_version.outputs.current }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump_version.outputs.new }}" > VERSION

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "bump version to ${{ steps.bump_version.outputs.new }} [skip ci]" || echo "No changes to commit"

      - name: Push version tag and commit
        run: |
          TAG="v${{ steps.bump_version.outputs.new }}"
          # Push the commit to master first
          git push origin master || echo "No changes to push"
          # Then push the tag
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tagged $TAG"
          fi

      - name: Set Docker tags
        id: docker_tags
        run: |
          VERSION="${{ steps.bump_version.outputs.new }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          {
            echo "tags<<EOF"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MAJOR}"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MAJOR}.${MINOR}"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build JAR
        run: ./gradlew build -x test --no-daemon

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
